<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldKitCoin Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; }
        .hash { font-family: monospace; font-size: 0.8rem; word-break: break-all; }
        .network-stats { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .stat-item { display: inline-block; margin-right: 30px; }
        @media (max-width: 600px) { .stat-item { display: block; margin-bottom: 5px; } }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mb-4">🌐 WorldKitCoin Explorer</h1>
    <div class="network-stats" id="stats">
        <div class="stat-item"><strong>Высота:</strong> <span id="height">-</span></div>
        <div class="stat-item"><strong>Сложность (target):</strong> <span id="difficulty">-</span></div>
        <div class="stat-item"><strong>Хешрейт:</strong> <span id="hashrate">-</span> H/s</div>
        <div class="stat-item"><strong>Эмиссия:</strong> <span id="supply">-</span> WKC</div>
        <div class="stat-item"><strong>Mempool:</strong> <span id="mempool_size">-</span></div>
        <div class="stat-item"><strong>Пиры:</strong> <span id="peers">-</span></div>
    </div>

    <h3>Последние блоки</h3>
    <div id="blocks-table"></div>

    <button class="btn btn-primary mt-3" onclick="loadData()">Обновить</button>
</div>

<script>
    async function loadData() {
        try {
            // Статистика сети
            const statsRes = await fetch('/network-stats');
            const stats = await statsRes.json();
            document.getElementById('height').textContent = stats.height;
            document.getElementById('difficulty').textContent = stats.difficulty_target;
            document.getElementById('hashrate').textContent = (stats.hashrate / 1e6).toFixed(2) + ' MH/s';
            document.getElementById('supply').textContent = stats.total_supply;
            document.getElementById('mempool_size').textContent = stats.mempool_size;
            document.getElementById('peers').textContent = stats.peer_count;

            // Последние блоки
            const blocksRes = await fetch('/latest-blocks?limit=10');
            const blocksData = await blocksRes.json();
            const blocks = blocksData.blocks;
            let html = `<table class="table table-striped table-hover">
                <thead><tr><th>Высота</th><th>Хэш</th><th>Время</th><th>Nonce</th><th>Транзакций</th></tr></thead><tbody>`;
            for (let b of blocks) {
                const date = new Date(b.timestamp * 1000).toLocaleString();
                html += `<tr>
                    <td>${b.height}</td>
                    <td class="hash"><a href="/block/${b.height}">${b.hash}</a></td>
                    <td>${date}</td>
                    <td>${b.nonce}</td>
                    <td>${b.tx_count}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            document.getElementById('blocks-table').innerHTML = html;
        } catch(e) {
            console.error(e);
            alert('Ошибка загрузки данных');
        }
    }

    loadData();
    setInterval(loadData, 10000); // обновление каждые 10 сек
</script>
</body>
</html>
