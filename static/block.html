<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блок | WorldKitCoin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-light" href="/">
                <span class="badge-network">WKC</span> WorldKitCoin Explorer
            </a>
            <a href="/" class="btn btn-sm btn-outline-secondary">← На главную</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="blockData">
            <div class="text-center text-secondary">Загрузка...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';

        function shortHash(hash, len=10) {
            if (!hash) return '-';
            if (hash.length <= len*2) return hash;
            return hash.slice(0, len) + '...' + hash.slice(-len);
        }

        function formatTime(unix) {
            return new Date(unix * 1000).toLocaleString('ru-RU');
        }

        async function loadBlock() {
            const hash = window.location.pathname.split('/').pop();
            if (!hash || hash === 'block.html') {
                document.getElementById('blockData').innerHTML = '<div class="alert alert-danger">Не указан хэш блока</div>';
                return;
            }
            try {
                // У нас нет прямого эндпоинта по хэшу, ищем по высоте через /blocks
                const res = await fetch(`${API_BASE}/info`);
                const info = await res.json();
                let block = null;
                let height = -1;
                // Проходим по цепочке (можно добавить отдельный эндпоинт /block_by_hash)
                // Пока используем /block/<height>
                for (let h = 0; h <= info.height; h++) {
                    const br = await fetch(`${API_BASE}/block/${h}`);
                    if (br.ok) {
                        const b = await br.json();
                        if (b.hash === hash) {
                            block = b;
                            height = h;
                            break;
                        }
                    }
                }
                if (!block) {
                    document.getElementById('blockData').innerHTML = '<div class="alert alert-danger">Блок не найден</div>';
                    return;
                }
                renderBlock(block, height);
            } catch (e) {
                document.getElementById('blockData').innerHTML = `<div class="alert alert-danger">Ошибка загрузки: ${e.message}</div>`;
            }
        }

        function renderBlock(block, height) {
            let html = `
                <div class="card">
                    <div class="card-header">
                        <h4>Блок #${height}</h4>
                    </div>
                    <div class="card-body">
                        <div class="row mb-2">
                            <div class="col-3 text-secondary">Хэш</div>
                            <div class="col-9"><span class="hash-text">${block.hash}</span></div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-3 text-secondary">Предыдущий хэш</div>
                            <div class="col-9"><span class="hash-text">${block.prev_hash}</span></div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-3 text-secondary">Время</div>
                            <div class="col-9">${formatTime(block.timestamp)}</div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-3 text-secondary">Nonce</div>
                            <div class="col-9">${block.nonce}</div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-3 text-secondary">Bits</div>
                            <div class="col-9">${block.bits}</div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-3 text-secondary">Merkle Root</div>
                            <div class="col-9"><span class="hash-text">${block.merkle_root}</span></div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-3 text-secondary">Транзакций</div>
                            <div class="col-9">${block.transactions.length}</div>
                        </div>
                    </div>
                </div>
                <div class="card mt-3">
                    <div class="card-header">Транзакции в блоке</div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush">
                            ${block.transactions.map(tx => `
                                <li class="list-group-item bg-dark text-light border-secondary">
                                    <span class="hash-text"><a href="/tx/${tx}">${tx}</a></span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `;
            document.getElementById('blockData').innerHTML = html;
            document.title = `Блок #${height} | WorldKitCoin`;
        }

        document.addEventListener('DOMContentLoaded', loadBlock);
    </script>
</body>
</html>
